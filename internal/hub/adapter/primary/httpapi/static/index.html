<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellate</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 2rem; background: #0f0f13; color: #e0e0e0; }
  h1 { margin: 0 0 1.5rem; font-size: 1.6rem; letter-spacing: 0.05em; color: #c0c8ff; }
  table { border-collapse: collapse; width: 100%; max-width: 900px; }
  th, td { padding: 0.6rem 1rem; text-align: left; border-bottom: 1px solid #2a2a3a; }
  th { font-size: 0.8rem; text-transform: uppercase; color: #888; }
  tr:hover td { background: #1a1a2a; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .online { background: #1a3a1a; color: #6ddc6d; }
  .offline { background: #3a1a1a; color: #dc6d6d; }
  #status { font-size: 0.8rem; color: #555; margin-bottom: 0.5rem; }
</style>
</head>
<body>
<h1>Constellate</h1>
<div id="status">Loading...</div>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>OS / Arch</th>
      <th>Agent Version</th>
      <th>Status</th>
      <th>Last Seen</th>
    </tr>
  </thead>
  <tbody id="machines"></tbody>
</table>
<script>
function relativeTime(ts) {
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 5) return 'just now';
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return new Date(ts * 1000).toISOString().slice(0, 19).replace('T', ' ') + ' UTC';
}

async function poll() {
  try {
    const resp = await fetch('/api/machines');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const machines = await resp.json();
    const tbody = document.getElementById('machines');
    tbody.innerHTML = machines.length === 0
      ? '<tr><td colspan="5" style="color:#555;text-align:center">No machines enrolled</td></tr>'
      : machines.map(m =>
          '<tr>' +
          '<td>' + escHtml(m.name) + '</td>' +
          '<td>' + escHtml(m.os) + ' / ' + escHtml(m.arch) + '</td>' +
          '<td>' + escHtml(m.agentVersion) + '</td>' +
          '<td><span class="badge ' + (m.online ? 'online' : 'offline') + '">' + (m.online ? 'online' : 'offline') + '</span></td>' +
          '<td>' + relativeTime(m.lastSeenAt) + '</td>' +
          '</tr>'
        ).join('');
    document.getElementById('status').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

poll();
setInterval(poll, 2000);
</script>
</body>
</html>
