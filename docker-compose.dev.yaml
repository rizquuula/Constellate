# docker-compose.dev.yaml — local dev / demo stack for trying Constellate (M1).
#
# Brings up the hub (with the embedded web UI) + two agent "machines" you can
# open a live shell into from the browser.
#
#   docker compose -f docker-compose.dev.yaml up --build -d
#   open http://localhost:8080   → pick an agent → "New shell" → type away
#   docker compose -f docker-compose.dev.yaml down            # stop (keeps data)
#   docker compose -f docker-compose.dev.yaml down -v         # stop + wipe data
#
# NOTE: the agents run *inside containers*, so the shells you open are shells in
# those Alpine containers — not your host. To get a terminal on your actual
# machine, run the agent as a host binary instead (see the README quickstart).
#
# Dev only: plain ws://, a shared dev token, bound to localhost. Not for the
# public internet (auth/TLS land in M5).

services:
  hub:
    build:
      context: .
      dockerfile: deploy/hub.Dockerfile
    environment:
      CONSTELLATE_ADDR: "0.0.0.0:8080"        # listen on all interfaces inside the container
      CONSTELLATE_DEV_TOKEN: "devtoken"
      CONSTELLATE_DB_PATH: "/data/constellate.db"
    volumes:
      - hub-data:/data                        # session/machine metadata survives restarts
    ports:
      - "127.0.0.1:8080:8080"                 # reach the UI at http://localhost:8080
    networks: [constellate]
    restart: unless-stopped

  agent-alpha:
    build:
      context: .
      dockerfile: deploy/agent.dev.Dockerfile
    environment:
      CONSTELLATE_HUB_URL: "ws://hub:8080/ws/agent"
      CONSTELLATE_DEV_TOKEN: "devtoken"
      CONSTELLATE_NAME: "agent-alpha"
    volumes:
      - agent-alpha-id:/root/.constellate     # stable machine id across restarts
    depends_on: [hub]
    networks: [constellate]
    restart: unless-stopped

  agent-beta:
    build:
      context: .
      dockerfile: deploy/agent.dev.Dockerfile
    environment:
      CONSTELLATE_HUB_URL: "ws://hub:8080/ws/agent"
      CONSTELLATE_DEV_TOKEN: "devtoken"
      CONSTELLATE_NAME: "agent-beta"
    volumes:
      - agent-beta-id:/root/.constellate
    depends_on: [hub]
    networks: [constellate]
    restart: unless-stopped

networks:
  constellate:
    driver: bridge

volumes:
  hub-data:
  agent-alpha-id:
  agent-beta-id:
