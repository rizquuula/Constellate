# Constellate M5 topology test: 1 hub + 2 agents on a bridge network.
# Agents only ever dial the hub (modelling dial-home behind NAT).
# M5: dev-token removed. Agents enroll via the shared entrypoint wrapper.

services:
  hub:
    build:
      context: ../..
      dockerfile: deploy/hub.Dockerfile
    environment:
      CONSTELLATE_ADDR: "0.0.0.0:8080"
      CONSTELLATE_DB_PATH: "/data/constellate.db"
      # No CONSTELLATE_DEV_TOKEN — agents must use enrollment credentials.
    tmpfs:
      - /data
    volumes:
      - token-share:/run/enroll
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - constellate

  # hub-init mints an enrollment token and writes it to the shared volume.
  hub-init:
    build:
      context: ../..
      dockerfile: deploy/hub.Dockerfile
    environment:
      CONSTELLATE_DB_PATH: "/data/constellate.db"
    tmpfs:
      - /data
    volumes:
      - token-share:/run/enroll
    networks:
      - constellate
    depends_on:
      - hub
    command: >
      sh -c "
        sleep 2 &&
        TOKEN=$$(constellate-hub enroll-token --ttl=1h) &&
        echo \"$$TOKEN\" > /run/enroll/token &&
        echo \"Token written: $$TOKEN\"
      "
    restart: "no"

  agent1:
    build:
      context: ../..
      dockerfile: test/docker/agent.test.Dockerfile
    environment:
      CONSTELLATE_HUB_URL: "ws://hub:8080/ws/agent"
      CONSTELLATE_HUB_BASE: "http://hub:8080"
      CONSTELLATE_NAME: "agent-1"
    volumes:
      - agent1-cred:/root/.constellate
      - token-share:/run/enroll:ro
    entrypoint: ["/usr/local/bin/agent-entrypoint.sh"]
    depends_on:
      - hub-init
    networks:
      - constellate

  agent2:
    build:
      context: ../..
      dockerfile: test/docker/agent.test.Dockerfile
    environment:
      CONSTELLATE_HUB_URL: "ws://hub:8080/ws/agent"
      CONSTELLATE_HUB_BASE: "http://hub:8080"
      CONSTELLATE_NAME: "agent-2"
    volumes:
      - agent2-cred:/root/.constellate
      - token-share:/run/enroll:ro
    entrypoint: ["/usr/local/bin/agent-entrypoint.sh"]
    depends_on:
      - hub-init
    networks:
      - constellate

networks:
  constellate:
    driver: bridge

volumes:
  token-share:
  agent1-cred:
  agent2-cred:
