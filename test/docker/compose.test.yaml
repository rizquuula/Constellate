# Constellate topology test: 1 hub + 2 agents on a bridge network.
# Agents only ever dial the hub (modelling dial-home behind NAT).
# run.sh mints one single-use enrollment token per agent
# (via `docker compose exec hub constellate-hub enroll-token`, against the hub's
# own DB) and injects it through CONSTELLATE_ENROLL_TOKEN at agent start.

services:
  hub:
    build:
      context: ../..
      dockerfile: deploy/hub.Dockerfile
    environment:
      CONSTELLATE_ADDR: "0.0.0.0:8080"
      CONSTELLATE_DB_PATH: "/data/constellate.db"
      # No CONSTELLATE_DEV_TOKEN — agents must use enrollment credentials.
    tmpfs:
      - /data
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - constellate

  agent1:
    build:
      context: ../..
      dockerfile: test/docker/agent.test.Dockerfile
    environment:
      CONSTELLATE_HUB_URL: "ws://hub:8080/ws/agent"
      CONSTELLATE_HUB_BASE: "http://hub:8080"
      CONSTELLATE_NAME: "agent-1"
      CONSTELLATE_ENROLL_TOKEN: "${AGENT1_TOKEN:-}"
    volumes:
      - agent1-cred:/root/.constellate
    entrypoint: ["/usr/local/bin/agent-entrypoint.sh"]
    depends_on:
      - hub
    networks:
      - constellate

  agent2:
    build:
      context: ../..
      dockerfile: test/docker/agent.test.Dockerfile
    environment:
      CONSTELLATE_HUB_URL: "ws://hub:8080/ws/agent"
      CONSTELLATE_HUB_BASE: "http://hub:8080"
      CONSTELLATE_NAME: "agent-2"
      CONSTELLATE_ENROLL_TOKEN: "${AGENT2_TOKEN:-}"
    volumes:
      - agent2-cred:/root/.constellate
    entrypoint: ["/usr/local/bin/agent-entrypoint.sh"]
    depends_on:
      - hub
    networks:
      - constellate

networks:
  constellate:
    driver: bridge

volumes:
  agent1-cred:
  agent2-cred:
