name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Detect which parts of the tree changed so the heavy jobs below only run
  # when their inputs actually moved. Skipped jobs still report a (skipped)
  # status, so this stays compatible with required status checks.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.golangci.yaml'
              - '.github/workflows/ci.yaml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yaml'

  build-test:
    name: lint · unit · integration · in-proc E2E
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      # web/embed.go has `//go:embed all:dist`, which needs web/dist/ to exist
      # at compile time. The frontend isn't built in this job, and Vite wipes
      # dist/ (incl. the tracked .gitkeep) on every build — so ensure a
      # placeholder exists here rather than depending on a fragile committed file.
      - name: Ensure embed dir exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test (unit + integration + in-process E2E, race-enabled)
        run: go test ./... -race -count=1

  frontend:
    name: frontend typecheck + build
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Typecheck
        run: cd web && npx tsc --noEmit

      - name: Build
        run: cd web && npm run build
