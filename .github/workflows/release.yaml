name: release

# Triggered by a datetime "release-train" tag, e.g. v20260615-0830.
# The tag is a neutral umbrella: the real per-binary semver is read from
# cmd/hub/VERSION and cmd/agent/VERSION (which version independently).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload assets
  packages: write # push images to GHCR

env:
  GOTOOLCHAIN: auto

jobs:
  # Build the embedded frontend once; the hub binary embeds web/dist via
  # //go:embed, so every hub build needs it present.
  web:
    name: build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web
        run: |
          cd web && npm ci && npm run build
          touch dist/.gitkeep

      - name: Upload web/dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          include-hidden-files: true

  # Cross-compile both binaries for each target and package as .tar.gz.
  binaries:
    name: build binaries
    needs: web
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Restore web/dist (for the hub embed)
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Build & package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          HUB_VERSION="$(cat cmd/hub/VERSION)"
          AGENT_VERSION="$(cat cmd/agent/VERSION)"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILDTIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PKG="github.com/rizquuula/Constellate/internal/platform/version"

          mkdir -p stage dist

          build() {
            local name="$1" version="$2" pkgdir="$3"
            go build -trimpath \
              -ldflags "-s -w -X ${PKG}.Version=${version} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.BuildTime=${BUILDTIME}" \
              -o "stage/${name}" "${pkgdir}"
            tar -czf "dist/${name}-v${version}-${GOOS}-${GOARCH}.tar.gz" -C stage "${name}"
            rm -f "stage/${name}"
          }

          build constellate-hub   "${HUB_VERSION}"   ./cmd/hub
          build constellate-agent "${AGENT_VERSION}" ./cmd/agent

          ls -la dist

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: archives-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  # Gather all archives, checksum them, and cut the GitHub Release.
  release:
    name: github release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, for the changelog range

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          pattern: archives-*
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist && sha256sum *.tar.gz > SHA256SUMS && cat SHA256SUMS

      # AI-written summary via OpenRouter, placed ABOVE GitHub's auto PR list.
      # Non-fatal: if the key is missing or the API fails, the release still
      # ships with just the default generated notes (empty body_path).
      - name: AI release notes (OpenRouter)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Override per repo: Settings → Variables → RELEASE_NOTES_MODEL.
          # Must be a valid OpenRouter model slug (see https://openrouter.ai/models).
          MODEL: ${{ vars.RELEASE_NOTES_MODEL || 'anthropic/claude-sonnet-4.6' }}
        run: |
          set -uo pipefail
          : > RELEASE_NOTES.md

          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "::warning::OPENROUTER_API_KEY not set — skipping AI notes."
            exit 0
          fi

          TAG="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -n "$PREV" ]; then RANGE="${PREV}..${TAG}"; else RANGE="${TAG}"; fi
          echo "Changelog range: ${RANGE}"

          LOG="$(git log --no-merges --pretty=format:'- %s' ${RANGE})"
          HUB_VERSION="$(cat cmd/hub/VERSION)"
          AGENT_VERSION="$(cat cmd/agent/VERSION)"

          cat > prompt.txt <<EOF
          You are writing GitHub release notes for Constellate, a self-hosted
          control plane where a hub brokers browser <-> per-machine agents.
          Hub version ${HUB_VERSION}, agent version ${AGENT_VERSION}.

          Write concise, user-facing notes in GitHub-flavored Markdown:
          a one-paragraph overview, then meaningful changes grouped under short
          headings (e.g. Features, Fixes, Internal). Omit pure CI/chore noise.
          Do not invent changes. Output only the Markdown body, no preamble.

          Commits:
          ${LOG}
          EOF

          REQ="$(jq -n --arg model "$MODEL" --rawfile prompt prompt.txt \
            '{model: $model, messages: [{role: "user", content: $prompt}]}')"

          if ! RESP="$(curl -sS --fail-with-body \
              https://openrouter.ai/api/v1/chat/completions \
              -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$REQ")"; then
            echo "::warning::OpenRouter request failed — using default notes only."
            echo "$RESP"
            exit 0
          fi

          CONTENT="$(echo "$RESP" | jq -r '.choices[0].message.content // empty')"
          if [ -z "$CONTENT" ]; then
            echo "::warning::Empty AI response — using default notes only."
            echo "$RESP" | jq -r '.error // .' || true
            exit 0
          fi

          printf '%s\n\n---\n' "$CONTENT" > RELEASE_NOTES.md
          echo "--- generated notes ---"
          cat RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md # AI summary; GitHub appends its PR list below
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

  # Build and push amd64 Linux images to GHCR.
  images:
    name: ghcr images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute versions
        id: ver
        run: |
          set -euo pipefail
          HUB="$(cat cmd/hub/VERSION)"
          AGENT="$(cat cmd/agent/VERSION)"
          echo "hub=${HUB}"                     >> "$GITHUB_OUTPUT"
          echo "hub_mm=$(echo "${HUB}" | cut -d. -f1,2)"     >> "$GITHUB_OUTPUT"
          echo "agent=${AGENT}"                 >> "$GITHUB_OUTPUT"
          echo "agent_mm=$(echo "${AGENT}" | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)"        >> "$GITHUB_OUTPUT"

      - name: Build & push hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/hub.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.hub }}
            COMMIT=${{ steps.ver.outputs.commit }}
          tags: |
            ghcr.io/rizquuula/constellate-hub:v${{ steps.ver.outputs.hub }}
            ghcr.io/rizquuula/constellate-hub:v${{ steps.ver.outputs.hub_mm }}
            ghcr.io/rizquuula/constellate-hub:latest
          labels: |
            org.opencontainers.image.source=https://github.com/rizquuula/Constellate
          cache-from: type=gha,scope=hub
          cache-to: type=gha,scope=hub,mode=max

      - name: Build & push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/agent.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.agent }}
            COMMIT=${{ steps.ver.outputs.commit }}
          tags: |
            ghcr.io/rizquuula/constellate-agent:v${{ steps.ver.outputs.agent }}-debian13
            ghcr.io/rizquuula/constellate-agent:v${{ steps.ver.outputs.agent_mm }}-debian13
            ghcr.io/rizquuula/constellate-agent:debian13
            ghcr.io/rizquuula/constellate-agent:latest
          labels: |
            org.opencontainers.image.source=https://github.com/rizquuula/Constellate
          cache-from: type=gha,scope=agent
          cache-to: type=gha,scope=agent,mode=max
