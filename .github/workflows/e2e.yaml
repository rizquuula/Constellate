name: e2e

# Heavy tiers (Playwright browser + Docker topology) — manual trigger only to
# conserve GitHub Actions minutes. Run from the Actions tab ("Run workflow").
# The cheap checks (lint, vet, race tests, frontend build) run automatically in ci.yaml.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-e2e:
    name: browser E2E (Playwright)
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: make test-e2e

  docker-topology:
    name: docker topology
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run docker topology test
        run: make test-docker
