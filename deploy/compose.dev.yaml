# deploy/compose.dev.yaml — local dev / demo stack for trying Constellate.
#
# Brings up the hub (with the embedded web UI) + two agent "machines" you can
# open a live shell into from the browser.
#
# Use the launcher — it builds the images, bootstraps the operator account
# account, enrolls both agents, and prints a ready-to-use login code:
#
#   ./deploy/dev-up.sh
#   open http://localhost:8080   → log in → pick an agent → "New shell"
#   ./deploy/dev-totp.sh         # print a fresh 6-digit login code anytime
#
#   docker compose -f deploy/compose.dev.yaml down      # stop (keeps data)
#   docker compose -f deploy/compose.dev.yaml down -v   # stop + wipe data
#
# NOTE: the agents run *inside containers*, so the shells you open are shells in
# those Debian containers — not your host. To get a terminal on your actual
# machine, run the agent as a host binary instead (see the README quickstart).
#
# dev-up.sh mints one single-use enrollment token per
# agent (against the hub's own DB) and injects it via CONSTELLATE_ENROLL_TOKEN.
# Plain ws://, bound to localhost — not for the public internet (use deploy/compose.yaml).

services:
  hub:
    build:
      context: ..
      dockerfile: deploy/hub.Dockerfile
    environment:
      CONSTELLATE_ADDR: "0.0.0.0:8080"
      CONSTELLATE_DB_PATH: "/data/constellate.db"
      # No CONSTELLATE_PUBLIC_URL → cookies are not marked Secure, so login
      # works over plain http://localhost.
    volumes:
      - hub-data:/data                        # session/machine metadata + operator survive restarts
    ports:
      - "127.0.0.1:8080:8080"                 # reach the UI at http://localhost:8080
    networks: [constellate]
    restart: unless-stopped

  agent-alpha:
    build:
      context: ..
      dockerfile: deploy/agent.dev.Dockerfile
    environment:
      CONSTELLATE_HUB_URL: "ws://hub:8080/ws/agent"
      CONSTELLATE_HUB_BASE: "http://hub:8080"
      CONSTELLATE_NAME: "agent-alpha"
      CONSTELLATE_ENROLL_TOKEN: "${AGENT_ALPHA_TOKEN:-}"
    volumes:
      - agent-alpha-id:/root/.constellate     # stable machine id + cred across restarts
    entrypoint: ["/usr/local/bin/agent-entrypoint.sh"]
    depends_on: [hub]
    networks: [constellate]
    restart: unless-stopped

  agent-beta:
    build:
      context: ..
      dockerfile: deploy/agent.dev.Dockerfile
    environment:
      CONSTELLATE_HUB_URL: "ws://hub:8080/ws/agent"
      CONSTELLATE_HUB_BASE: "http://hub:8080"
      CONSTELLATE_NAME: "agent-beta"
      CONSTELLATE_ENROLL_TOKEN: "${AGENT_BETA_TOKEN:-}"
    volumes:
      - agent-beta-id:/root/.constellate
    entrypoint: ["/usr/local/bin/agent-entrypoint.sh"]
    depends_on: [hub]
    networks: [constellate]
    restart: unless-stopped

networks:
  constellate:
    driver: bridge

volumes:
  hub-data:
  agent-alpha-id:
  agent-beta-id:
